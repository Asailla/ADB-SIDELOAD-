name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX 1: Java ต้อง set JAVA_HOME ให้ถูก (สำคัญมาก)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # FIX 2: ใช้ Flutter action แทน wget (เสถียรกว่า)
      - name: Setup Flutter
        uses: subosito/flutter-action@v3
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # dependencies
      - name: Get dependencies
        run: flutter pub get

      # FIX 3: clean gradle state (กัน error cd $SAVED)
      - name: Clean Android build
        run: |
          cd android
          ./gradlew clean || true
          cd ..

      # build
      - name: Build APK
        run: flutter build apk --release

      # upload
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
