name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # FIX 1: Java แบบไม่ให้พัง JAVA_HOME
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # FIX 2: Flutter stable
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # DEBUG สำคัญ (ดูว่า JAVA_HOME พังไหม)
      - name: Debug environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          which java
          java -version

      # dependencies
      - name: Get dependencies
        run: flutter pub get

      # FIX 3: ล้าง Gradle state ที่ทำให้ SAVED error
      - name: Clean Android project
        run: |
          cd android
          rm -rf .gradle
          rm -rf build
          chmod +x gradlew
          cd ..

      # build
      - name: Build APK
        run: flutter build apk --release

      # upload
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
