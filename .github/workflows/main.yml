name: Build Flutter APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Fix JAVA_HOME in gradlew
        run: |
          REAL_JAVA=$(which java)
          REAL_JAVA_HOME=$(dirname $(dirname $REAL_JAVA))
          echo "Real JAVA_HOME = $REAL_JAVA_HOME"
          sed -i 's|JAVA_HOME=\$JAVA_HOME|JAVA_HOME='"$REAL_JAVA_HOME"'|g' android/gradlew
          sed -i 's|cd "\$SAVED"||g' android/gradlew
          cat android/gradlew | head -30

      - name: Fix AndroidX
        run: |
          grep -qxF 'android.useAndroidX=true' android/gradle.properties || echo "android.useAndroidX=true" >> android/gradle.properties
          grep -qxF 'android.enableJetifier=true' android/gradle.properties || echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Clean Android project
        run: |
          cd android
          rm -rf .gradle
          rm -rf build
          chmod +x gradlew
          cd ..

      - name: Build APK
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          export JAVA_HOME=$(dirname $(dirname $(which java)))
          echo "Using JAVA_HOME=$JAVA_HOME"
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
